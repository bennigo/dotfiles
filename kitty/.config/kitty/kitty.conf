font_family      HackNerdFont
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 13.0
scrollback_lines 10000
scrollback_pager ~/.local/bin/kitty-scrollback-pager
url_style curly

enable_audio_bell no
visual_bell_duration 0.1
bell_on_tab "🔔 "
confirm_os_window_close 0
background_opacity 0.7
dynamic_background_opacity yes
dim_opacity 0.4
allow_remote_control yes
listen_on unix:/tmp/kitty-sock
shell_integration enabled
kitty_mod ctrl+shift

# ~/.config/kitty/kitty.conf
# paste_actions replace-dangerous-control-codes,replace-newline
# copy_on_select yes
clipboard_control write-clipboard write-primary read-clipboard read-primary
# clipboard_control write-primary true# map kitty_mod+c copy_to_clipboard

# ── Clipboard ────────────────────────────────────────────────────────────────
# ## Clipboard // Copy to clipboard // 📋 ##
map kitty_mod+c copy_to_clipboard
# ## Clipboard // Paste from clipboard // 📋 ##
map kitty_mod+v paste_from_clipboard
# ## Clipboard // Paste from selection // 📋 ##
map kitty_mod+s paste_from_selection
# ## Clipboard // Paste image as file path (clip2path) // 🖼 ##
map ctrl+v launch --type=background --allow-remote-control --keep-focus ~/.local/bin/clip2path

# ── Scrolling ─────────────────────────────────────────────────────────────────
# ## Navigation // Show scrollback in pager // 📜 ##
map kitty_mod+h show_scrollback
# ## Navigation // Scroll line up // ↑ ##
map kitty_mod+k scroll_line_up
# ## Navigation // Scroll line down // ↓ ##
map kitty_mod+j scroll_line_down
# ## Navigation // Scroll page up // ⇑ ##
map kitty_mod+page_up scroll_page_up
# ## Navigation // Scroll page down // ⇓ ##
map kitty_mod+page_down scroll_page_down
# ## Navigation // Scroll to top // ⤒ ##
map kitty_mod+home scroll_home
# ## Navigation // Scroll to bottom // ⤓ ##
map kitty_mod+end scroll_end

# ── Windows ───────────────────────────────────────────────────────────────────
# ## Windows // New window // ＋ ##
map kitty_mod+enter new_window
# ## Windows // Close window // ✕ ##
map kitty_mod+w close_window
# ## Windows // Next window // → ##
map kitty_mod+] next_window
# ## Windows // Previous window // ← ##
map kitty_mod+[ previous_window
# ## Windows // Move window forward // ⇥ ##
map kitty_mod+f move_window_forward
# ## Windows // Toggle layout // ⊞ ##
map kitty_mod+l next_layout

# ── Tabs ──────────────────────────────────────────────────────────────────────
# ## Tabs // New tab // ＋ ##
map kitty_mod+t new_tab
# ## Tabs // Close tab // ✕ ##
map kitty_mod+q close_tab
# ## Tabs // Next tab // → ##
map kitty_mod+right next_tab
# ## Tabs // Previous tab // ← ##
map kitty_mod+left previous_tab

# ── Font size ─────────────────────────────────────────────────────────────────
# ## Font // Increase font size // ＋ ##
map kitty_mod+equal change_font_size all +2.0
# ## Font // Decrease font size // － ##
map kitty_mod+minus change_font_size all -2.0
# ## Font // Reset font size // ↺ ##
map kitty_mod+backspace change_font_size all 0

# ── Config ────────────────────────────────────────────────────────────────────
# ## Config // Reload config // ↺ ##
map kitty_mod+f5 load_config_file
# ## Config // Edit config // ✏ ##
map kitty_mod+f2 edit_config_file

# ── Other ─────────────────────────────────────────────────────────────────────
# ## Editing // Send Escape+Enter (newline in AI prompts) // ⏎ ##
map shift+enter send_text all \e\r
# ## Help // Show keyboard shortcuts // ❓ ##
map kitty_mod+/ launch --type=overlay ~/.local/bin/kitty-shortcuts
include current-theme.conf
