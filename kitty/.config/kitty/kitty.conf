font_family      HackNerdFont
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 13.0
scrollback_lines 10000
scrollback_pager ~/.local/bin/kitty-scrollback-pager
url_style curly

enable_audio_bell no
visual_bell_duration 0.1
bell_on_tab "🔔 "
confirm_os_window_close 0
background_opacity 0.7
dynamic_background_opacity yes
dim_opacity 0.4
allow_remote_control yes
listen_on unix:/tmp/kitty-sock
shell_integration enabled
kitty_mod ctrl+shift

# ~/.config/kitty/kitty.conf
# paste_actions replace-dangerous-control-codes,replace-newline
# copy_on_select yes
# clipboard_control write-clipboard write-primary read-clipboard read-primary
# clipboard_control write-primary true# map kitty_mod+c copy_to_clipboard

# map ctrl+c copy_or_interrupt
map ctrl+v paste_from_clipboard
map kitty_mod+v paste_from_selection

# clip2path (image → file path for Claude Code): run manually: ~/.local/bin/clip2path

# Enable wayland clipboard integration

# map cmd+c       copy_to_clipboard
# map kitty_mod+v paste_from_clipboard
# map cmd+v       paste_from_clipboard
# map kitty_mod+s  paste_from_selection
# map shift+insert paste_from_selection
# map kitty_mod+up    scroll_line_up
# map kitty_mod+k     scroll_line_up
# map kitty_mod+down    scroll_line_down
# map kitty_mod+j       scroll_line_down
# Vim-style scrollback (like tmux prefix+[)
map kitty_mod+h show_scrollback  ## Navigation // Show scrollback in pager // 📜 ##
map shift+enter send_text all \e\r  ## Editing // Send Escape+Enter (newline in AI prompts) // ⏎ ##
map kitty_mod+/ launch --type=overlay ~/.local/bin/kitty-shortcuts  ## Help // Show keyboard shortcuts // ❓ ##
include current-theme.conf
