# First remove *all* keybindings
# unbind-key -a

# Now reinsert all the regular tmux keys
bind-key ^X lock-server  ## Session // Lock server // 🔒 ##
bind-key ^D detach  ## Session // Detach from session // 🚪 ##
bind-key R source-file ~/.config/tmux/tmux.conf  ## Config // Reload config // 🔄 ##
bind-key * list-clients  ## Session // List all attached clients // 👥 ##
bind-key : command-prompt  ## Misc // Open command prompt // : ##
bind-key L switch-client -l  ## Session // Switch to last client // ↩ ##
bind-key [ copy-mode  ## Navigation // Enter copy mode // 📋 ##

bind-key W new-window -c "#{pane_current_path}"  ## Windows // New window (current dir) // ＋ ##
bind-key ^W new-window -c "$HOME"  ## Windows // New window (home dir) // 🏠 ##
bind-key w list-windows  ## Windows // List all windows // 📋 ##
bind-key ^A last-window  ## Windows // Switch to last window // ↩ ##
bind-key r command-prompt "rename-window %%"  ## Windows // Rename current window // ✏ ##
bind-key '"' choose-window  ## Windows // Choose window interactively // 🗂 ##

bind-key z resize-pane -Z  ## Panes // Zoom/unzoom current pane // 🔍 ##
bind-key ^L refresh-client  ## Misc // Refresh terminal client display // 🔄 ##
# bind-key | split-window
bind-key | split-window -h -c "#{pane_current_path}"  ## Panes // Split pane right // | ##
bind-key \\ split-window -v -c "#{pane_current_path}"  ## Panes // Split pane down // — ##
# bind-key c new-window

bind-key h select-pane -L  ## Panes // Focus left pane // ← ##
bind-key j select-pane -D  ## Panes // Focus pane below // ↓ ##
bind-key k select-pane -U  ## Panes // Focus pane above // ↑ ##
bind-key l select-pane -R  ## Panes // Focus right pane // → ##

bind-key -r -T prefix , resize-pane -L 20  ## Panes // Resize pane left // ← ##
bind-key -r -T prefix . resize-pane -R 20  ## Panes // Resize pane right // → ##
bind-key -r -T prefix - resize-pane -D 7  ## Panes // Resize pane down // ↓ ##
bind-key -r -T prefix = resize-pane -U 7  ## Panes // Resize pane up // ↑ ##
# bind-key * set synchronize-panes
bind-key P set pane-border-status  ## Panes // Toggle pane border labels // 🏷 ##
bind-key x swap-pane -D  ## Panes // Swap pane downward // ⇅ ##
bind-key S choose-session  ## Session // Choose session interactively // 📋 ##
bind-key -T copy-mode-vi v send-keys -X begin-selection  ## Copy Mode // Begin visual selection // ✂ ##
# bind-key -n C-n display-popup -E nvim -c ":Telescope"
# bind-key -n C-q display-popup -w "90%" -h "85%" -E nvim -c ":ObsidianSearch"

# set-option -g allow-passthrough on
set -g allow-passthrough on
set -g terminal-features 'xterm*:256'
set -g visual-activity off

# mouse enabling
set -g mouse on
set -g focus-events on
set -g set-clipboard off
bind-key -T copy-mode-vi MouseDown2Pane paste-buffer

# Refresh shell env + Wayland env in all panes (prefix + E)
# Uses 'source' to load the function first, so it works even in shells started before the config change
# refresh-shell-env is a superset: sources aliases-claude.zsh + calls refresh-wayland-env
bind-key E run-shell "tmux list-panes -a -F '#{pane_id}' | xargs -I{} tmux send-keys -t {} 'source ~/.config/zsh/exports.zsh 2>/dev/null && refresh-shell-env' Enter"  ## Env // Refresh shell env in all panes // 🔄 ##
