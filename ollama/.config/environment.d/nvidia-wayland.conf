# NVIDIA 595-open + wlroots/Sway: disable atomic modesetting.
#
# NVIDIA's DRM driver returns EBUSY on non-blocking atomic commits
# (ATOMIC_NONBLOCK | PAGE_FLIP_EVENT), causing repeated page-flip
# failures on eDP-1 during normal operation. With NO_ATOMIC=1,
# wlroots falls back to the legacy sequential KMS path that NVIDIA
# handles correctly. This also stabilises suspend/resume since the
# display pipeline is in a clean state when s2idle is entered.
#
# Confirmed broken: NVIDIA 595.58.03, kernel 7.0.0-14-generic, Sway 1.11
# Remove when NVIDIA driver properly supports atomic commits on Wayland.
WLR_DRM_NO_ATOMIC=1
