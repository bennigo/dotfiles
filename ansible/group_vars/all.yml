# Global variables for all hosts
# These can be overridden in host_vars/ or via command line

# User configuration
# Use lookup('env', 'USER') to get the actual user who invoked ansible (works with sudo/become)
# Can be overridden: ansible-playbook bootstrap.yml --extra-vars "target_user=otheruser"
target_user: "{{ lookup('env', 'USER') | default('bgo') }}"
target_home: "/home/{{ target_user }}"
target_email: "{{ override_email | default('bgo@vedur.is') }}"
target_name: "{{ override_name | default('Benedikt Gunnar Ófeigsson') }}"

# Installation profiles (predefined combinations)
profiles:
  # User setup (base packages + dotfiles for additional users)
  user:
    - base
    - dotfiles
  minimal:
    - base
    - email
    - dotfiles
  development:
    - base
    - system_files
    - development
    - database
    - docker
    - dotfiles
  desktop:
    - base
    - system_files
    - development
    - database
    - docker
    - desktop
    - email
    - dotfiles
  full:
    - base
    - system_files
    - development
    - database
    - docker
    - desktop
    - email
    - credentials
    - dotfiles
  work_laptop:
    - base
    - system_files
    - development
    - database
    - docker
    - desktop
    - email
    - credentials
    - dotfiles
  # Work-only setup (development environment without desktop/email)
  work_only:
    - base
    - system_files
    - development
    - database
    - docker
    - credentials
    - dotfiles
  # Agent server (OpenClaw AI agent with isolation) - dedicated machine
  agent_server:
    - base
    - credentials
    - docker
    - dotfiles
    - agent
  # Agent add-on - layer agent user onto an existing desktop/work machine
  agent_addon:
    - agent

# Version pins (bump here when upgrading)
nvidia_driver_version: "580"
go_version: "1.24.5"

# Hardware-specific role activation
hardware_roles:
  nvidia:
    enabled: "{{ has_nvidia_gpu | default(false) or force_nvidia | default(false) }}"
    packages:
      - "nvidia-driver-{{ nvidia_driver_version }}"
      - "nvidia-utils-{{ nvidia_driver_version }}"
    modprobe_configs:
      - "nvidia-drm modeset=1"
  
  laptop:
    enabled: "{{ is_laptop | default(false) or force_laptop | default(false) }}"
    packages:
      - tlp
      - tlp-rdw  
      - powertop
      - brightnessctl
    services:
      - tlp
      
  desktop:
    enabled: "{{ is_desktop | default(true) }}"
    packages:
      - pulseaudio
      - pulseaudio-utils

# Feature flags (easy to toggle)
features:
  install_development_tools: true
  install_desktop_environment: true
  install_gaming_tools: false
  install_media_tools: false
  setup_credentials: false  # Requires manual intervention
  deploy_work_configs: false
  # Personal configuration (bgo-specific) - disable for other users
  setup_personal_repos: "{{ target_user == 'bgo' }}"
  # Work infrastructure (vedur.is) - NFS mounts, internal hosts
  setup_work_infrastructure: "{{ target_user == 'bgo' }}"
  # Agent server features (disabled by default)
  setup_agent_server: false
  setup_tailscale: false
  setup_firewall: false

# Personal repository configuration (only used when setup_personal_repos is true)
personal_repos:
  obsidian_vault:
    url: "git@github.com:bennigo/bgovault.git"
    dest: "{{ target_home }}/notes/bgovault"
    branch: "main"
  
# Package lists (easy to extend)
base_packages:
  - git
  - stow
  - zsh
  - vim
  - curl
  - wget
  - unzip
  - build-essential
  - jq  # JSON processing (used by sway IPC, tmux statusline, claude-notify hook)
  - nfs-common  # Required for NFS network mounts in fstab
  
development_packages:
  - cmake
  - pkg-config
  - python3
  - python3-pip
  - nodejs
  - npm
  - git-crypt
  
desktop_packages:
  - sway
  - waybar
  - rofi
  - mako-notifier
  - foot
  - wdisplays
  - kanshi

# Agent server configuration (used by agent role)
agent_user: "openclaw-agent"
agent_home: "/home/openclaw-agent"
agent_workspace: "/opt/openclaw"
# Dual-use: agent layered onto an existing desktop (skip firewall, vault lockdown, bgo home chmod)
agent_dual_use: false
# npm packages installed globally for the agent user
agent_npm_packages:
  - "@anthropic-ai/claude-code"
  - "openclaw"

# Dotfiles deployment control (empty = auto-discover, backward-compatible)
# Override in profile to limit which dirs are stowed
stow_directories: []
# Systemd user services to enable (empty = use defaults: claude-imports, mako-watcher, password-store-sync)
dotfiles_systemd_services: []
dotfiles_systemd_services_no_start: []
# Config dirs to verify after stow (empty = use defaults: sway, waybar, foot)
dotfiles_verify_configs: []

# Directory structure
directories:
  dotfiles: "{{ target_home }}/.dotfiles"
  local_bin: "{{ target_home }}/.local/bin"  
  config: "{{ target_home }}/.config"