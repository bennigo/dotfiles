# herdr config — mirrors bgo's tmux workflow (prefix, session switch, theme)
# Herdr merges this with its defaults; only overrides listed here.

[keys]
# Match tmux prefix (tmux.conf: unbind C-b; set prefix C-a)
prefix = "ctrl+a"

# tmux default detach binding (tmux-sensible keeps prefix+d)
detach = "prefix+d"

# ctrl+a L — alternate session toggle (tmux switch-client -l reflex).
# last_pane toggles to the last-focused pane, which jumps back to the
# workspace you were just in (alt-tab for workspaces).
last_pane = "prefix+shift+l"

# workspace_picker replaced by the fzf custom command below (prefix+o)
# — herdr's built-in picker only lists existing workspaces; the custom
# command adds zoxide recent dirs (sessionx-style).

[[keys.command]]
# ctrl+a o — tmux-sessionx-style picker (existing workspaces + zoxide dirs)
key = "prefix+o"
type = "pane"
command = "~/.local/bin/herdr-sessionx"
description = "workspace picker (fzf + zoxide)"

[[keys.command]]
# ctrl+a R — re-source ~/.zshenv in all shell panes (after env changes)
key = "prefix+shift+r"
type = "pane"
command = "~/.local/bin/herdr-refresh-env"
description = "refresh env in all shell panes"

[theme]
# Match omerxx/catppuccin-tmux
name = "catppuccin"

[[keys.command]]
# ctrl+a Alt+n — prepend "N. " to tab labels so they match the number keys
key = "prefix+alt+n"
type = "pane"
command = "~/.local/bin/herdr-renumber-tabs"
description = "renumber tabs in focused workspace"

[[keys.command]]
# ctrl+a H — create a thin header status bar at top of current tab
key = "prefix+shift+h"
type = "shell"
command = "~/.local/bin/herdr-header-init"
description = "toggle header status bar (cwd, clock, gps, power, network)"
