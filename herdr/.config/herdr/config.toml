onboarding = false
# herdr config — mirrors bgo's tmux workflow (prefix, session switch, theme)
# Herdr merges this with its defaults; only overrides listed here.

[keys]
# Match tmux prefix (tmux.conf: unbind C-b; set prefix C-a)
prefix = "ctrl+a"

# tmux default detach binding (tmux-sensible keeps prefix+d)
detach = "prefix+d"

# ctrl+a t — rename current WORKSPACE (label only; cwd is never touched).
# Mnemonic pair with rename_tab (prefix+shift+t). Native herdr action.
rename_workspace = "prefix+t"

# ctrl+a L — alternate WORKSPACE toggle (tmux switch-client -l reflex).
# Herdr has no native "last workspace" action (last_pane flips panes/tabs),
# so this uses a custom tracker daemon + toggle script. See herdr-ws-toggle.
# last_pane is left unset.

[[keys.command]]
# ctrl+a o — tmux-sessionx-style picker (existing workspaces + zoxide dirs)
key = "prefix+o"
type = "pane"
command = "~/.local/bin/herdr-sessionx"
description = "workspace picker (fzf + zoxide)"

[[keys.command]]
# ctrl+a R — re-source ~/.zshenv in all shell panes (after env changes)
key = "prefix+shift+r"
type = "pane"
command = "~/.local/bin/herdr-refresh-env"
description = "refresh env in all shell panes"

[theme]
# Match omerxx/catppuccin-tmux
name = "catppuccin"

# Override theme palette tokens. The ACTIVE sidebar workspace/agent row is
# drawn with the theme accent, so recolor it to blue here (separate from
# [ui] accent, which only affects nav UI like the menu dot / cursor).
[theme.custom]
accent = "#89b4fa"
# The ACTIVE workspace row AND active agent row are drawn with bg(surface_dim)
# (herdr src/ui/sidebar.rs lines 676 & 1069); normal rows get no background.
# catppuccin's surface_dim ~= panel_bg, so the highlight is invisible. Override
# it to navy so the active session/agent row gets a clear blue background.
surface_dim = "#242633"

[[keys.command]]
# ctrl+a Alt+n — prepend "N. " to tab labels so they match the number keys
key = "prefix+alt+n"
type = "pane"
command = "~/.local/bin/herdr-renumber-tabs"
description = "renumber tabs in focused workspace"

[[keys.command]]
# ctrl+a L — toggle to last workspace (tmux switch-client -l style)
key = "prefix+shift+l"
type = "shell"
command = "~/.local/bin/herdr-ws-toggle"
description = "toggle to last workspace"

[[keys.command]]
# ctrl+a l — toggle to last TAB in current workspace (tmux prefix+l last-window).
# Herdr has no native "last tab" MRU action (previous_tab/next_tab are
# sequential), so this uses a custom tracker daemon + toggle script,
# mirroring the workspace toggle. See herdr-tab-toggle / herdr-tab-track.
key = "prefix+l"
type = "shell"
command = "~/.local/bin/herdr-tab-toggle"
description = "toggle to last tab (current workspace)"

[ui.toast]
delivery = "system"

[ui]
show_agent_labels_on_pane_borders = true
# Accent color for highlights, borders, and navigation UI — drives the
# ACTIVE workspace row (sidebar) and the ACTIVE agent row highlight.
# catppuccin blue for strong contrast against the dimmed inactive rows.
accent = "#89b4fa"

[ui.sound]
enabled = true

[[keys.command]]
# ctrl+a O — split pane popup to reorder tabs in current workspace
key = "prefix+shift+o"
type = "pane"
command = "~/.local/bin/herdr-tab-reorder-popup"
description = "reorder tabs (split pane popup)"
