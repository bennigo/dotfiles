onboarding = false
# herdr config — mirrors bgo's tmux workflow (prefix, session switch, theme)
# Herdr merges this with its defaults; only overrides listed here.

[keys]
# Match tmux prefix (tmux.conf: unbind C-b; set prefix C-a)
prefix = "ctrl+a"

# tmux default detach binding (tmux-sensible keeps prefix+d)
detach = "prefix+d"

# ctrl+a t — rename current WORKSPACE (label only; cwd is never touched).
# Mnemonic pair with rename_tab (prefix+shift+t). Native herdr action.
rename_workspace = "prefix+t"

# ctrl+a shift+<N> — jump straight to WORKSPACE N (repo-per-workspace).
# The workspace list is the repo list (receivers=1, tostools=2, ...), and with
# 14 of them the only native alternatives were sequential (next/previous_workspace)
# or the fzf picker (prefix+o). Native indexed action — no script needed.
# Note: switch_tab = "prefix+1..9" is already ON by default; only the workspace
# level was missing.
switch_workspace = "prefix+shift+1..9"

# ctrl+a alt+<N> — focus AGENT N in the current workspace.
# Herdr detects agent panes natively (claude/pi/codex/...) and tracks their
# status, so this is SEMANTIC, not positional: it keeps working when tabs are
# reordered, unlike a "tab 3 = claude, tab 4 = pi" convention.
focus_agent = "prefix+alt+1..9"

# ctrl+a L — alternate WORKSPACE toggle (tmux switch-client -l reflex).
# Herdr has no native "last workspace" action (last_pane flips panes/tabs),
# so this uses a custom tracker daemon + toggle script. See herdr-ws-toggle.
# last_pane is left unset.

[[keys.command]]
# ctrl+a o — tmux-sessionx-style picker (existing workspaces + zoxide dirs)
key = "prefix+o"
type = "pane"
command = "~/.local/bin/herdr-sessionx"
description = "workspace picker (fzf + zoxide)"

[[keys.command]]
# ctrl+a R — re-source ~/.zshenv in all shell panes (after env changes)
key = "prefix+shift+r"
type = "pane"
command = "~/.local/bin/herdr-refresh-env"
description = "refresh env in all shell panes"

[theme]
# Match omerxx/catppuccin-tmux
name = "catppuccin"

# Override theme palette tokens. The ACTIVE sidebar workspace/agent row is
# drawn with the theme accent, so recolor it to blue here (separate from
# [ui] accent, which only affects nav UI like the menu dot / cursor).
[theme.custom]
accent = "#89b4fa"
# The ACTIVE workspace row AND active agent row are drawn with bg(surface_dim)
# (herdr src/ui/sidebar.rs lines 676 & 1069); normal rows get no background.
# catppuccin's surface_dim ~= panel_bg, so the highlight is invisible. Override
# it to navy so the active session/agent row gets a clear blue background.
surface_dim = "#242633"
# Active workspace/agent NAME is drawn with fg(p.text) (sidebar.rs 868 & 1075).
# text is the global UI foreground, so this also tints dialog/menu/status text.
text = "#89b4fa"

[[keys.command]]
# ctrl+a Alt+n — prepend "N. " to tab labels so they match the number keys
key = "prefix+alt+n"
type = "pane"
command = "~/.local/bin/herdr-renumber-tabs"
description = "renumber tabs in focused workspace"

[[keys.command]]
# ctrl+a L — toggle to last workspace (tmux switch-client -l style)
key = "prefix+shift+l"
type = "shell"
command = "~/.local/bin/herdr-ws-toggle"
description = "toggle to last workspace"

[[keys.command]]
# ctrl+a l — toggle to last TAB in current workspace (tmux prefix+l last-window).
# Herdr has no native "last tab" MRU action (previous_tab/next_tab are
# sequential), so this uses a custom tracker daemon + toggle script,
# mirroring the workspace toggle. See herdr-tab-toggle / herdr-tab-track.
key = "prefix+l"
type = "shell"
command = "~/.local/bin/herdr-tab-toggle"
description = "toggle to last tab (current workspace)"

[ui.toast]
delivery = "system"

[ui]
show_agent_labels_on_pane_borders = true
# Accent color for highlights, borders, and navigation UI — drives the
# ACTIVE workspace row (sidebar) and the ACTIVE agent row highlight.
# catppuccin blue for strong contrast against the dimmed inactive rows.
accent = "#89b4fa"

[ui.sound]
enabled = true

[[keys.command]]
# ctrl+a O — split pane popup to reorder tabs in current workspace
key = "prefix+shift+o"
type = "pane"
command = "~/.local/bin/herdr-tab-reorder-popup"
description = "reorder tabs (split pane popup)"

# ── Harpoon: 4 curated workspace slots ────────────────────────────────────────
# ctrl+a alt+[hjkl] — jump to pinned workspace
# ctrl+a ctrl+[hjkl] — pin CURRENT tab to that slot
#
# Why alongside switch_workspace: the native indexed binding follows workspace
# CREATION order and only reaches 1..9, which drifts from real use — gps_parser
# was 4th most-used but sat at slot 14, unreachable. These 4 slots follow intent.
# Pins target a TAB (not a workspace) so the destination never drifts to
# whatever tab was last active there. Seeded from the herdr-ws-track MRU
# history; re-pin any time. Edit the list with prefix+alt+e. See herdr-harpoon.

[[keys.command]]
key = "prefix+alt+h"
type = "shell"
command = "~/.local/bin/herdr-harpoon jump h"
description = "harpoon: jump to slot h"

[[keys.command]]
key = "prefix+alt+j"
type = "shell"
command = "~/.local/bin/herdr-harpoon jump j"
description = "harpoon: jump to slot j"

[[keys.command]]
key = "prefix+alt+k"
type = "shell"
command = "~/.local/bin/herdr-harpoon jump k"
description = "harpoon: jump to slot k"

[[keys.command]]
key = "prefix+alt+l"
type = "shell"
command = "~/.local/bin/herdr-harpoon jump l"
description = "harpoon: jump to slot l"

[[keys.command]]
key = "prefix+ctrl+h"
type = "shell"
command = "~/.local/bin/herdr-harpoon pin h"
description = "harpoon: pin current tab to slot h"

[[keys.command]]
key = "prefix+ctrl+j"
type = "shell"
command = "~/.local/bin/herdr-harpoon pin j"
description = "harpoon: pin current tab to slot j"

[[keys.command]]
key = "prefix+ctrl+k"
type = "shell"
command = "~/.local/bin/herdr-harpoon pin k"
description = "harpoon: pin current tab to slot k"

[[keys.command]]
key = "prefix+ctrl+l"
type = "shell"
command = "~/.local/bin/herdr-harpoon pin l"
description = "harpoon: pin current tab to slot l"

[[keys.command]]
# ctrl+a alt+e — harpoon quick menu: edit the pin list in nvim.
# type = "pane" opens a temporary pane and closes it when nvim exits, so the
# list is edited with real nvim keys (dd, :m, visual) instead of a bespoke UI.
key = "prefix+alt+e"
type = "pane"
command = "~/.local/bin/herdr-harpoon edit"
description = "harpoon: edit pin list (nvim)"
